[general]
profile_img_url=https://cdn.jsdelivr.net/gh/loongfzs/QuantumultX-Config@main/ss-rule-snippet-icon.png
network_check_url=http://connectivitycheck.platform.hicloud.com/generate_204
server_check_url=http://www.google.com/generate_204
#geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://cdn.jsdelivr.net/gh/Orz-3/Orz-3@master/QuantumultX/IP.js
#resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
resource_parser_url=https://cdn.jsdelivr.net/gh/KOP-XIAO/QuantumultX@master/Scripts/resource-parser.js
excluded_routes= 0.0.0.0/8, 10.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.168.0.0/16, 192.88.99.0/24, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 255.255.255.255/32
dns_exclusion_list=*.cmpassport.com
fallback_udp_policy=direct
ssid_suspended_list=6kEWc5kQhKTn, 8JeaEhv9E0bW-Wifi

[dns]
no-system
no-ipv6
doh-server=https://doh.360.cn/dns-query

