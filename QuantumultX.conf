static=🇺🇸 美国节点, server-tag-regex=(?i)(美国|USA), img-url=https://raw.githubusercontent.com/Orz-3/face/master/US.png
static=🌏 全球节点, server-tag-regex=.*, img-url=https://raw.githubusercontent.com/Orz-3/face/master/UN.png

