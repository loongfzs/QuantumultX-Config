static=🇭🇰 香港节点, server-tag-regex=(?i)(香港|HKG), img-url=https://raw.githubusercontent.com/Orz-3/face/master/HK.png
static=🇨🇳 台湾节点, server-tag-regex=(?i)(台湾|TWN), img-url=https://raw.githubusercontent.com/Orz-3/face/master/TW.png
static=🇸🇬 狮城节点, server-tag-regex=(?i)(新加坡|SGP), img-url=https://raw.githubusercontent.com/Orz-3/face/master/SG.png
